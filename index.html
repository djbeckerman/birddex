<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BirdDex — My Field Journal</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6B8F4A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BirdDex" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />

    <!-- Open Graph / Share (static defaults — profile pages update these dynamically) -->
    <meta property="og:title" content="BirdDex — My Field Journal" />
    <meta property="og:description" content="A Pokédex-style bird collection app for the Santa Monica coast. Discover, identify, and track birds near you." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://birddex-one.vercel.app" />
    <meta property="og:image" content="https://birddex-one.vercel.app/icons/icon-512.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="BirdDex — My Field Journal" />
    <meta name="twitter:description" content="A Pokédex-style bird collection app. Discover birds near you." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // Service worker registration failed — app still works without it
          });
        });
      }
    </script>
  </body>
</html>
